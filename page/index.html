<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCS Downloads</title>
    <link rel="stylesheet" href="css/md3.css">
    <link rel="stylesheet" href="css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>">
</head>
<body>
    <!-- 顶部应用栏 -->
    <header class="md3-top-app-bar">
        <div class="md3-top-app-bar__row">
            <div class="md3-top-app-bar__leading">
                <span class="material-symbols-outlined md3-logo">download</span>
                <h1 class="md3-top-app-bar__title" id="site-name">OCS Downloads</h1>
            </div>
            <div class="md3-top-app-bar__trailing">
                <button class="md3-icon-button" id="theme-toggle" aria-label="切换主题">
                    <span class="material-symbols-outlined">dark_mode</span>
                </button>
            </div>
        </div>
    </header>

    <!-- 主内容 -->
    <main class="md3-main">
        <!-- Hero 区域 -->
        <section class="md3-hero">
            <div class="md3-hero__content">
                <h2 class="md3-display-medium" id="site-desc">OCS 下载中心</h2>
                <p class="md3-body-large md3-on-surface-variant">
                    安全、快速、跨平台的OCS官方分发服务
                </p>
            </div>
            <!-- 搜索栏 -->
            <div class="md3-search">
                <span class="material-symbols-outlined md3-search__icon">search</span>
                <input type="text" class="md3-search__input" placeholder="搜索项目..." id="search-input">
            </div>
        </section>

        <!-- 项目列表 -->
        <section class="md3-section" id="projects-section">
            <div class="md3-section__header">
                <h3 class="md3-title-large">可用项目</h3>
                <div class="md3-filter-chips" id="category-filters">
                    <button class="md3-filter-chip md3-filter-chip--selected" data-category="all">全部</button>
                </div>
            </div>
            <div class="md3-card-grid" id="project-cards">
                <!-- 由 JS 动态渲染 -->
            </div>
        </section>

        <!-- 详情面板（侧边栏式） -->
        <aside class="md3-detail-panel" id="detail-panel">
            <div class="md3-detail-panel__overlay" id="detail-overlay"></div>
            <div class="md3-detail-panel__content">
                <div class="md3-detail-panel__header">
                    <button class="md3-icon-button" id="detail-close" aria-label="关闭">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>
                <div class="md3-detail-panel__body" id="detail-body">
                    <!-- 由 JS 动态渲染 -->
                </div>
            </div>
        </aside>
    </main>

    <!-- 底部 -->
    <footer class="md3-footer">
        <div class="md3-footer__content">
            <p id="footer-copyright">© 2026 OCS</p>
            <nav class="md3-footer__links" id="footer-links"></nav>
        </div>
    </footer>

    <!-- Toast -->
    <div class="md3-snackbar" id="snackbar">
        <span class="md3-snackbar__text"></span>
        <button class="md3-snackbar__action">关闭</button>
    </div>

    <script src="js/config.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
