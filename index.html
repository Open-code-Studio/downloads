<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下载中心</title>
    <style>
        :root {
            --primary: #4AA26F;
            --on-primary: #ffffff;
            --surface: #1a1c1e;
            --on-surface: #e3e2e6;
            --surface-container: #26282c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Roboto', 'Noto Sans SC', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: var(--surface);
            color: var(--on-surface);
        }

        .splash {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .splash__icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 8px 24px rgba(74, 162, 111, 0.35);
        }

        .splash__title {
            font-size: 1.6rem;
            font-weight: 500;
            color: var(--on-surface);
        }

        .splash__sub {
            font-size: 0.9rem;
            color: #8e9099;
            max-width: 360px;
            line-height: 1.6;
        }

        .splash__countdown {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #8e9099;
            margin-top: 8px;
        }

        .splash__spinner {
            width: 18px;
            height: 18px;
            border: 2px solid var(--surface-container);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .splash__link {
            display: inline-block;
            margin-top: 8px;
            padding: 10px 28px;
            border-radius: 24px;
            background: var(--primary);
            color: var(--on-primary);
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            transition: filter 0.2s ease, box-shadow 0.2s ease;
        }

        .splash__link:hover {
            filter: brightness(1.1);
            box-shadow: 0 4px 16px rgba(74, 162, 111, 0.4);
        }
    </style>
</head>
<body>
    <div class="splash">
        <div class="splash__icon">📦</div>
        <div class="splash__title">下载中心</div>
        <div class="splash__sub">安全、快速、跨平台的分发服务</div>
        <div class="splash__countdown" id="countdown">
            <div class="splash__spinner"></div>
            <span>将在 <strong id="countdown-num">3</strong> 秒后自动跳转</span>
        </div>
        <a class="splash__link" href="page/index.html">立即进入 →</a>
    </div>

    <script>
        (function () {
            var el = document.getElementById('countdown-num');
            var seconds = 3;
            var timer = setInterval(function () {
                seconds--;
                if (seconds <= 0) {
                    clearInterval(timer);
                    window.location.href = 'page/index.html';
                } else {
                    el.textContent = seconds;
                }
            }, 1000);
        })();
    </script>
</body>
</html>
